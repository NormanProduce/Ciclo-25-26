name: Sync Excel files

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar Gastos
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/1cf27V6bg69F3-M_U_ZbBkq_6fMUvIvvR/export?format=xlsx" -o gastos.xlsx

      - name: Descargar Ingresos
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/1qqEFvke4MLLLpA_KEPCYCr1uiU-CSf8m/export?format=xlsx" -o ingresos.xlsx

      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gastos.xlsx ingresos.xlsx
          git diff --staged --quiet || git commit -m "sync excel"
          git push
